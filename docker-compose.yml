services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
      - ml-service
    networks:
      - app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_DATABASE: ${POSTGRES_DB:-log_anomaly}
      DB_USERNAME: ${POSTGRES_USER:-logwatch}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
    expose:
      - "${BACKEND_INTERNAL_PORT:-8000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    expose:
      - "${FRONTEND_INTERNAL_PORT:-3000}"
    networks:
      - app

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    environment:
      ML_SERVICE_HOST: 0.0.0.0
      ML_SERVICE_PORT: ${ML_SERVICE_INTERNAL_PORT:-8001}
    expose:
      - "${ML_SERVICE_INTERNAL_PORT:-8001}"
    networks:
      - app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-log_anomaly}
      POSTGRES_USER: ${POSTGRES_USER:-logwatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-logwatch} -d ${POSTGRES_DB:-log_anomaly}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
